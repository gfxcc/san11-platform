name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_ZONE: ${{ secrets.GCP_ZONE }}
  GCP_PROD_INSTANCE: ${{ secrets.GCP_PROD_INSTANCE }}
  GCP_PROD_SSH_USER: ${{ secrets.GCP_PROD_SSH_USER }}
  GCP_PROD_REPO_PATH: ${{ secrets.GCP_PROD_REPO_PATH }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test

  deploy-prod:
    name: Deploy production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy on production VM
        run: |
          gcloud compute ssh \
            --quiet \
            --zone "${GCP_ZONE}" \
            "${GCP_PROD_SSH_USER}@${GCP_PROD_INSTANCE}" \
            --project "${GCP_PROJECT_ID}" \
            --command "set -euo pipefail
              cd '${GCP_PROD_REPO_PATH}'
              git fetch origin main
              git checkout main
              git pull --ff-only origin main
              make deploy-prod"
