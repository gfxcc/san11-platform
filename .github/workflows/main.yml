name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_ZONE: ${{ secrets.GCP_ZONE }}
  GCP_PROD_INSTANCE: ${{ secrets.GCP_PROD_INSTANCE }}
  GCP_PROD_SSH_USER: ${{ secrets.GCP_PROD_SSH_USER }}
  GCP_PROD_REPO_PATH: ${{ secrets.GCP_PROD_REPO_PATH }}

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install backend dependencies
        working-directory: back-end
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run backend tests
        working-directory: back-end
        run: make utest itest PY=python

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: front-end
        run: npm install

      - name: Build frontend for production
        working-directory: front-end
        run: npm run build -- --configuration=production --project=san11-platform

  gateway-test:
    name: Gateway tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.3'

      - name: Run gateway tests
        working-directory: back-end/gateway
        run: go test ./...

  ui-e2e:
    name: UI end-to-end
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: front-end
        run: npm install

      - name: Install Playwright browser
        working-directory: front-end
        run: npx playwright install --with-deps chromium

      - name: Start development stack
        run: docker compose -f compose.yaml -f compose.dev.yaml up -d --build

      - name: Wait for frontend
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://localhost:4200 > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f compose.yaml -f compose.dev.yaml ps
          docker compose -f compose.yaml -f compose.dev.yaml logs --tail=200
          exit 1

      - name: Run UI regression test
        working-directory: front-end
        run: npm run e2e:playwright

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f compose.yaml -f compose.dev.yaml logs --tail=200

  production-image-build:
    name: Production image build
    needs:
      - backend-test
      - frontend-build
      - gateway-test
      - ui-e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build production images
        run: make build-prod

  deploy-prod:
    name: Deploy production
    needs:
      - backend-test
      - frontend-build
      - gateway-test
      - ui-e2e
      - production-image-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy on production VM
        run: |
          gcloud compute ssh \
            --quiet \
            --zone "${GCP_ZONE}" \
            "${GCP_PROD_SSH_USER}@${GCP_PROD_INSTANCE}" \
            --project "${GCP_PROJECT_ID}" \
            --command "set -euo pipefail
              cd '${GCP_PROD_REPO_PATH}'
              git fetch origin main
              git checkout main
              git pull --ff-only origin main
              make deploy-prod"

      - name: Verify production frontend
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error https://san11pk.org > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Verify production API health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error https://api.san11pk.org/v1/healthz | grep -q '"status":"ok"'; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Dump production diagnostics
        if: failure()
        run: |
          gcloud compute ssh \
            --quiet \
            --zone "${GCP_ZONE}" \
            "${GCP_PROD_SSH_USER}@${GCP_PROD_INSTANCE}" \
            --project "${GCP_PROJECT_ID}" \
            --command "cd '${GCP_PROD_REPO_PATH}' && \
              docker compose -f compose.yaml -f compose.prod.yaml ps && \
              docker compose -f compose.yaml -f compose.prod.yaml logs --tail=200"
