<article class="article-card clickable-card" (click)="onClick()">
    <div class="article-cover">
        <img [hidden]="this.loadingPreview" class="cover-image" [src]="getCoverImage()" [alt]="article.subject"
            (load)="this.loadingPreview=false;">
        <p-skeleton *ngIf="this.loadingPreview" width="100%" height="100%"></p-skeleton>
    </div>

    <div class="article-content">
        <header class="article-card-header">
            <div class="title-row">
                <h2>{{article.subject}}</h2>

                <span class="status-badge" [hidden]="!((isAdmin() || isAuthor()) && article.state!=1)">
                    {{getStatusName()}}
                </span>
            </div>

            <div class="entry-meta">
                <span class="entry-avatar">
                    <img [src]="this.user?.imageUrl | fullUrl: '128_128'" class="avatar-img" width="36" height="36"
                        [alt]="user?.username || '作者头像'">
                    <span>{{user?.username}}</span>
                </span>
                <span class="meta-dot"></span>
                <span>{{getArticleAge()}}</span>
            </div>
        </header>

        <p class="article-preview">
            {{getContentReview()}}
        </p>

        <footer class="entry-footer">
            <span class="meta-pill">
                <mat-icon>auto_stories</mat-icon>
                {{article.viewCount || 0}}
            </span>
            <span class="read-link">
                阅读全文
                <mat-icon>arrow_forward</mat-icon>
            </span>
        </footer>
    </div>
</article>
