<div class="article-detail-page">
    <article class="article-detail surface-panel">
        <header class="detail-header">
            <div class="article-kicker">社区文章</div>
            <h1 #articleSubjectElement class="entry-title">
                {{article.subject}}
            </h1>

            <div class="author-line">
                <img [src]="this.user?.imageUrl | fullUrl : '128_128'" width="58" height="58" class="avatar"
                    [alt]="user?.username || '作者头像'">
                <div>
                    <p>{{user?.username}}</p>
                    <span>{{getArticleUpdateTime()}}</span>
                </div>
            </div>
        </header>

        <section class="editor-section">
            <ckeditor class="editor" [data]="this.article.content" [editor]="this.editorService.getEditorInstance()"
                (ready)="this.editorService.onReady($event)" (change)="onDescEditorChange($event)"
                [disabled]="this.editorService.disabled" [config]="this.editorService.getConfig()"></ckeditor>
        </section>

        <footer class="article-actions">
            <div *ngIf="(isAdmin() || isAuthor())" class="management-actions">
                <button *ngIf="isAuthor() && !editing" mat-stroked-button color="primary" (click)="startEditing()">
                    <mat-icon>edit</mat-icon>
                    编辑文章
                </button>
                <button *ngIf="editing" mat-stroked-button (click)="cancelEditing()">取消编辑</button>
                <button mat-stroked-button [matMenuTriggerFor]="articleMenu">
                    <mat-icon>settings</mat-icon>
                    管理
                </button>
                <mat-menu #articleMenu="matMenu">
                    <button mat-menu-item (click)="onFlipState()">
                        <mat-icon>{{article.state===3 ? 'visibility' : 'visibility_off'}}</mat-icon>
                        {{article.state===3 ? '发布文章' : '隐藏文章'}}
                    </button>
                    <button mat-menu-item class="danger-menu-item" (click)="onDelete()">
                        <mat-icon>delete</mat-icon>
                        删除文章
                    </button>
                </mat-menu>
            </div>

            <span class="example-spacer"></span>

            <app-feedback-card [target]="this.article.name" [likeCount]="this.article.likeCount"
                [dislikeCount]="this.article.dislikeCount"></app-feedback-card>

            <button *ngIf="editing && this.descEditor_updated" mat-flat-button color="primary" class="save-button"
                (click)="onUpdate()">
                <mat-icon>save</mat-icon>
                更新
            </button>
        </footer>
    </article>

    <section class="comments-panel surface-panel">
        <app-comment-board [parent]="article.name"></app-comment-board>
    </section>
</div>
