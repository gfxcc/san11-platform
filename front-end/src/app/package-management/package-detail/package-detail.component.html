<div class="page-wrapper">
    <div class="page-content">

        <div class="detail-admin-bar show-border-dev">
            <span class="example-spacer"></span>

            <button mat-stroked-button color="primary" *ngIf="this.packageNameUpdated" (click)="onUpdateTitle()"
                class="title-update-button">更新标题</button>

        </div>

        <section class="resource-hero">
            <div class="image-gallery">
                <gallery class="gallery" [items]="images" [thumb]="true" thumbPosition="left" thumbMode="free"
                    [counter]="false" slidingDirection="vertical" [nav]="false" (itemClick)="onGalleryItemClick($event)"
                    [autoPlay]="false" [playerInterval]="5000" #gallery></gallery>

                <input type="file" accept="image/*" hidden="true" #imageInput (change)="onUploadScreenshot(imageInput)">
            </div>

            <aside class="resource-summary surface-panel app-detail-section">
                <h2 class="panel-title app-section-title">资源详情</h2>
                <h1>
                    <span #packageNameTitle class="title" (focus)="this.packageNameUpdated=true;">
                        {{this.package.packageName}}
                    </span>
                </h1>

                <div class="primary-info-render">
                    <div class="meta-pill">
                        <mat-icon>download</mat-icon>
                        <span>{{this.package.downloadCount}} 下载</span>
                    </div>
                    <div class="meta-pill">
                        <mat-icon>calendar_today</mat-icon>
                        <span matTooltip="创建日期">{{this.package.createTime}}</span>
                    </div>
                    <div class="meta-pill">
                        <mat-icon>update</mat-icon>
                        <span matTooltip="最近更新">{{this.package.updateTime}}</span>
                    </div>
                </div>

                <div class="summary-actions app-action-stack">
                    <button mat-flat-button color="primary" class="download-cta" type="button"
                        (click)="scrollToVersions()">
                        <mat-icon>download</mat-icon>
                        查看版本
                    </button>

                    <button mat-stroked-button color="primary" class="collect-action" (click)="onToggleCollect()">
                        <mat-icon>{{isCollected ? 'playlist_remove' : 'playlist_add'}}</mat-icon>
                        {{collectButtonText}}
                    </button>
                </div>

                <div class="top-level-buttons app-action-row">
                    <app-feedback-card [target]="this.package.name" [likeCount]="this.package.likeCount"
                        [dislikeCount]="this.package.dislikeCount"></app-feedback-card>

                    <button mat-icon-button matTooltip="分享 (未开放)" disabled="true" class="summary-icon-button">
                        <mat-icon>share</mat-icon>
                    </button>

                    <button mat-icon-button matTooltip="更多" class="summary-icon-button" [matMenuTriggerFor]="menu">
                        <mat-icon>more_horiz</mat-icon>
                    </button>
                    <mat-menu #menu="matMenu">
                        <button mat-menu-item (click)="onReport()" [disabled]="true">
                            <mat-icon>flag</mat-icon>
                            <span>举报(未开放)</span>
                        </button>
                    </mat-menu>
                </div>

                <div *ngIf="isAdmin() || isAuthor()" class="package-management">
                    <button mat-stroked-button class="management-trigger" [matMenuTriggerFor]="packageManagementMenu">
                        <mat-icon>admin_panel_settings</mat-icon>
                        管理资源
                    </button>
                    <mat-menu #packageManagementMenu="matMenu" xPosition="before">
                        <button mat-menu-item *ngIf="isAdmin() && this.package.state===2" (click)="onApprove()">
                            <mat-icon>verified</mat-icon>
                            <span>通过审核</span>
                        </button>
                        <button mat-menu-item *ngIf="isAdmin() && (this.package.state===1 || this.package.state===3)"
                            (click)="onFlipHide()">
                            <mat-icon>{{this.package.state===3 ? 'visibility' : 'visibility_off'}}</mat-icon>
                            <span>{{this.package.state===3 ? '取消隐藏' : '隐藏资源'}}</span>
                        </button>
                        <button mat-menu-item class="danger-menu-item" *ngIf="authorZone" (click)="onDelete()">
                            <mat-icon>delete</mat-icon>
                            <span>删除资源</span>
                        </button>
                    </mat-menu>
                </div>

                <div class="summary-tags" *ngIf="this.package.tags?.length || tagCanEdit">
                    <div class="summary-tags-header">
                        <h3>标签</h3>
                        <mat-form-field *ngIf="tagCanEdit" appearance="outline" class="summary-tag-select">
                            <mat-select required placeholder="新标签" (selectionChange)="newTagSelected($event.value)">
                                <mat-option *ngFor="let tag of this.allTags" [value]="tag">
                                    {{tag.tagName}}
                                </mat-option>
                            </mat-select>
                        </mat-form-field>
                    </div>

                    <mat-chip-listbox #chipList>
                        <mat-chip-option *ngFor="let tag of this.package.tags" selectable="false"
                            [removable]="this.tagCanEdit" (removed)="removeTag(tag)">
                            {{tag.tagName}}
                            <mat-icon matChipRemove *ngIf="this.tagCanEdit">cancel</mat-icon>
                        </mat-chip-option>
                    </mat-chip-listbox>
                </div>
            </aside>
        </section>

        <section class="meta-content surface-panel app-detail-section">
            <div class="detail-section-header app-section-header">
                <h2 class="app-section-title">资源介绍</h2>
            </div>
            <div class="description-layout">
                <app-user-info-with-sub-button class="user-info-with-sub-button" [user]="this.author">
                </app-user-info-with-sub-button>

                <div class="package-description-section"
                    [class.package-description-section-can-expand]="descriptionCanExpand"
                    [class.package-description-section-folded]="descFolded"
                    [class.package-description-section-expanded]="!descFolded">
                    <div #descriptionContainer id="description-container" [class.desc-folded]="descFolded && !descEditor_updated"
                        [class.desc-full]="!(descFolded &&
                        !descEditor_updated)">
                        <ckeditor *ngIf="!descriptionIsEmpty || isAuthor() || descEditor_updated" #description
                            [data]="this.package.description"
                            [editor]="this.editorService.getEditorInstance()"
                            (ready)="onDescriptionEditorReady($event)" [disabled]="this.editorService.disabled"
                            [config]="this.editorService.getConfig()" (change)="onDescEditorChange($event)"
                            (focus)="descEditor_onFocus=true" (blur)="descEditor_onFocus=false"></ckeditor>
                        <div *ngIf="descriptionIsEmpty && !isAuthor() && !descEditor_updated"
                            class="description-empty-state">
                            <mat-icon>notes</mat-icon>
                            <span>作者暂未填写资源介绍</span>
                        </div>
                    </div>
                    <div class="description-expand-row" *ngIf="!descEditor_updated && descFolded && descriptionCanExpand">
                        <button id="more-button" type="button" mat-stroked-button color="primary" class="more-button"
                            (click)="onDescription()">
                            <span>展开完整介绍</span>
                            <mat-icon>keyboard_arrow_down</mat-icon>
                        </button>
                        <!-- <span id="more-button" *ngIf="!descFolded" (click)="this.descFolded = true;" class="more-button">折叠</span> -->
                    </div>
                </div>

                <div class="description-actions">
                    <button *ngIf="this.descEditor_updated" mat-stroked-button color="primary" (click)="onUpdateDesc()"
                        class="update-button">更新</button>
                </div>

            </div>

        </section>

        <section class="version-info show-border-dev app-detail-section" id="versions" #versionsSection>
            <app-version-panel [package]="this.package" (downloadEvent)="onChildDownload($event)">
            </app-version-panel>
        </section>

        <section class="discussion-panel">
            <app-discussion [parent]="this.package.name" class="discussion-section"></app-discussion>
        </section>

    </div>
</div>
