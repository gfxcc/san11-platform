<div class="branch-panel" *ngIf="branch.binaries.length > 0; else emptyBranch">
    <table mat-table [dataSource]="dataSource" class="version-table app-data-table">
        <ng-container matColumnDef="version">
            <th mat-header-cell *matHeaderCellDef> 版本 </th>
            <td mat-cell *matCellDef="let binary" class="version-column-cell">
                <button mat-button class="version-log-button" (click)="onDescription(binary)" matTooltip="更新日志">
                    <mat-icon>description</mat-icon>
                    <span>{{this.getVersionStr(binary)}}</span>
                </button>
            </td>
        </ng-container>

        <ng-container matColumnDef="createTime">
            <th mat-header-cell *matHeaderCellDef class="date-column"> 更新于 </th>
            <td mat-cell *matCellDef="let binary" class="muted-cell"> {{binary.createTime}} </td>
        </ng-container>

        <ng-container matColumnDef="size">
            <th mat-header-cell *matHeaderCellDef class="size-column"> 大小 </th>
            <td mat-cell *matCellDef="let binary" class="muted-cell"> {{binary.size || '—'}} </td>
        </ng-container>

        <ng-container matColumnDef="downloadCount">
            <th mat-header-cell *matHeaderCellDef class="count-column"> 下载量 </th>
            <td mat-cell *matCellDef="let binary" class="count-cell">
                {{binary.downloadCount}}
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="align-right"> 选项 </th>

            <td mat-cell *matCellDef="let binary" class="actions-cell">
                <div class="action-cluster app-row-actions">
                    <button *ngIf="binary.file" mat-flat-button color="primary" (click)="onDownload(binary)"
                        class="action-button action-primary download-action">
                        <mat-icon>download</mat-icon>
                        <span>下载</span>
                    </button>

                    <button *ngIf="binary.downloadMethod" mat-flat-button color="primary" (click)="onDownload(binary)"
                        class="action-button action-primary download-action">
                        <mat-icon>info</mat-icon>
                        <span>下载方式</span>
                    </button>

                    <button *ngIf="binary.cloudDiskFile" mat-flat-button color="primary" (click)="onDownload(binary)"
                        class="action-button action-primary download-action">
                        <mat-icon>cloud_download</mat-icon>
                        <span>网盘下载</span>
                    </button>
                    <button *ngIf="binary.cloudDiskFile?.code" mat-stroked-button
                        class="action-button action-secondary" type="button"
                        (click)="copyCloudDiskCode(binary)">
                        <mat-icon>content_copy</mat-icon>
                        复制密码
                    </button>

                    <button *ngIf="editorPermission" mat-stroked-button
                        class="action-button action-tertiary row-menu-button"
                        [matMenuTriggerFor]="rowMenu" matTooltip="管理版本">
                        <mat-icon>settings</mat-icon>
                        <span>管理</span>
                    </button>
                    <mat-menu #rowMenu="matMenu" xPosition="before">
                        <button mat-menu-item *ngIf="binary.size != &quot;&quot;" (click)="onOffload(binary)">
                            <mat-icon>inventory_2</mat-icon>
                            <span>卸载文件</span>
                        </button>
                        <button mat-menu-item class="danger-menu-item" (click)="onDelete(binary)">
                            <mat-icon>delete</mat-icon>
                            <span>删除版本</span>
                        </button>
                    </mat-menu>
                </div>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSize]="5" [hidePageSize]="true"></mat-paginator>
</div>

<ng-template #emptyBranch>
    <div class="empty-branch app-empty-state">
        <mat-icon>inventory_2</mat-icon>
        <p>暂无版本</p>
    </div>
</ng-template>
