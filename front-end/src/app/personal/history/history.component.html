<div class="history-page app-page app-page-narrow">
    <section class="history-header app-page-header">
        <div>
            <h1>我的足迹</h1>
            <p>最近浏览、互动和内容更新记录。</p>
        </div>
        <span *ngIf="events?.length" class="history-count app-count-pill">{{events.length}} 条</span>
    </section>

    <section class="history-feed app-activity-feed" *ngIf="events?.length; else emptyHistory">
        <article *ngFor="let event of events" class="history-item app-activity-item" (click)="onDetailClick(event)"
            [class.history-item-disabled]="!event.link" [class.is-disabled]="!event.link">
            <span class="history-marker app-activity-marker" [style.backgroundColor]="event.color">
                <mat-icon>{{event.icon}}</mat-icon>
            </span>

            <div class="history-card app-activity-card">
                <div class="history-card-copy app-activity-copy">
                    <div class="history-card-header app-activity-card-header">
                        <h2>{{event.displayName}}</h2>
                        <span>{{event.createTime}}</span>
                    </div>
                    <p *ngIf="event.description">{{event.description}}</p>
                </div>

                <img *ngIf="event.image" [src]="event.image" [alt]="event.displayName" />
            </div>
        </article>
    </section>

    <ng-template #emptyHistory>
        <div class="history-empty app-empty-state">
            <mat-icon>history</mat-icon>
            <p>暂无足迹</p>
        </div>
    </ng-template>
</div>
