<div class="notifications-page">
    <section class="settings-panel surface-panel">
        <header class="settings-panel-header">
            <div>
                <h1>消息通知</h1>
                <p>选择站内消息和邮件通知的接收方式。</p>
            </div>
            <span class="settings-save-state">
                <mat-icon>{{saving ? 'sync' : 'cloud_done'}}</mat-icon>
                {{saving ? '正在保存' : '更改会自动保存'}}
            </span>
        </header>

        <div class="section">
            <div class="settings-options-renderer">偏好</div>

            <div class="section-content">
                <div class="switch-box">
                    <mat-slide-toggle color="primary" [(ngModel)]="user.settings.notification.recommendations"
                        (change)="updateSetting()">推荐</mat-slide-toggle>
                    <div class="switch-description">
                        获取系统推荐的内容
                    </div>
                </div>
                <div class="switch-box">
                    <mat-slide-toggle color="primary" [(ngModel)]="user.settings.notification.subscriptions"
                        (change)="updateSetting()">订阅</mat-slide-toggle>
                    <div class="switch-description">
                        获取已订阅内容的更新
                    </div>
                </div>
                <div class="switch-box">
                    <mat-slide-toggle color="primary" [(ngModel)]="user.settings.notification.mentions"
                        (change)="updateSetting()">&#64;我</mat-slide-toggle>
                    <div class="switch-description">
                        获取提到我的消息
                    </div>
                </div>
                <div class="switch-box">
                    <mat-slide-toggle color="primary" [(ngModel)]="user.settings.notification.threads"
                        (change)="updateSetting()">新讨论</mat-slide-toggle>
                    <div class="switch-description">
                        获取我的作品下的新讨论
                    </div>
                </div>
                <div class="switch-box">
                    <mat-slide-toggle color="primary" [(ngModel)]="user.settings.notification.comments"
                        (change)="updateSetting()">新评论</mat-slide-toggle>
                    <div class="switch-description">
                        获取相关新评论
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="settings-options-renderer">邮件通知</div>

            <div class="section-content">
                <div class="switch-box">
                    <mat-slide-toggle color="primary" [(ngModel)]="user.settings.notification.sendEmails"
                        (change)="updateSetting()">通过邮件接收通知</mat-slide-toggle>
                    <div class="switch-description">
                        将通知以邮件的方式发送
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
