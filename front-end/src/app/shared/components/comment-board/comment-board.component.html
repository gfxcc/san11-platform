<div class="main">
    <div class="status-section">
        <div class="comment-count">
            <span>{{this.commentCount}}</span>
            <span>条评论</span>
        </div>
        <div class="comment-sort-control" [class.comment-sort-latest]="commentsOrder === 'create_time desc'"
            role="group" aria-label="评论排序">
            <span class="comment-sort-glass" aria-hidden="true"></span>
            <button type="button" class="comment-sort-option" [class.comment-sort-option-active]="commentsOrder !==
                'create_time desc'" [attr.aria-pressed]="commentsOrder !== 'create_time desc'"
                (click)="selectCommentOrder('create_time')">
                最早
            </button>
            <button type="button" class="comment-sort-option" [class.comment-sort-option-active]="commentsOrder ===
                'create_time desc'" [attr.aria-pressed]="commentsOrder === 'create_time desc'"
                (click)="selectCommentOrder('create_time desc')">
                最新
            </button>
        </div>
    </div>

    <div class="header">
        <div *ngIf="!this.sendCommentLoading" class="comment-editor-row">
            <div mat-card-avatar class="author-image">
                <img [hidden]="this.hideAuthorImage" [src]="this.authorImage
                    |
                    fullUrl : '256_256'" (load)="this.hideAuthorImage= false;" class="author-image">
            </div>
            <div class="right">
                <div class="comment-editor-frame">
                    <ckeditor class="editor" [data]="this.descEditor_data"
                        [editor]="this.editorService.getEditorInstance()" [config]="this.editorService.getConfig()"
                        (ready)="this.editorService.onReady($event)" (focus)="descEditor_onFocus=true;
                        this.hideCommentEditor=false" (blur)="descEditor_onFocus=false"
                        [disabled]="this.editorService.disabled" (change)="onDescEditorChange($event)"></ckeditor>
                </div>
                <div class="actions-section" *ngIf="!disableInput &&
                    this.descEditor_updated">
                    <span class="example-spacer"></span>
                    <button mat-button color="grey" (click)="onCancel()">取消</button>
                    <button type="submit" mat-stroked-button color="primary" [disabled]="this.descEditor_element?.getData() ==
                        &quot;&quot;" (click)="onCreateComment()">确定</button>
                </div>
            </div>
        </div>

        <div *ngIf="this.sendCommentLoading" class="comment-loading-state" role="status" aria-live="polite">
            <mat-spinner diameter="28"></mat-spinner>
            <span>正在发布评论…</span>
        </div>
    </div>

    <div class="contents">
        <!-- <app-comment-card *ngFor="let package of packages" class="col-1-4">
            <app-package-card [package]="package" class="module package"></app-package-card>
        </app-comment-card> -->
        <ng-container *ngFor="let comment of this.comments">
            <app-comment-card id="comment-{{comment.index}}" [comment]="comment"
                [resourceOwnerId]="this.resourceOwnerId" (commentDeleteEvent)="onCommentDelete($event)"
                (replyCreateEvent)="onReplyCreate($event)"></app-comment-card>
            <!-- <div id="comment-{{comment.index}}">hi</div> -->
        </ng-container>
    </div>

    <div *ngIf="comments.length === 0" class="app-empty-state">
        <mat-icon>chat_bubble_outline</mat-icon>
        <p>{{disableInput ? '暂无评论' : '还没有评论，来发表第一条吧'}}</p>
    </div>

    <div class="comment-bottom-space"></div>
</div>
