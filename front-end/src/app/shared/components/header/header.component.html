<mat-toolbar class="app-toolbar">
    <button mat-icon-button class="toolbar-icon" aria-label="打开导航" (click)="toggleSideBar()">
        <mat-icon>menu</mat-icon>
    </button>

    <button class="brand-button" type="button" (click)="onClickIcon()">
        <span class="brand-mark">
            <mat-icon>extension</mat-icon>
        </span>
        <span class="website-title">San11 分享平台</span>
    </button>

    <div #searchBar id="search-bar" class="search-bar-container">
        <div class="search-bar-input-wrapper">
            <mat-icon class="search-icon">search</mat-icon>
            <input #searchInput [(ngModel)]="this.searchQuery" type="text" spellcheck="false" autocomplete="off"
                placeholder="搜索工具、MOD 或插件" (ngModelChange)="this.searchChanged()"
                (focus)="openSearchPanel()" (keydown.enter)="submitSearch()" class="search-input">
            <mat-icon matTooltip="支持 工具名" class="help-icon">help_outline</mat-icon>
        </div>
        <div *ngIf="searchPanelOpen && searchQuery.trim().length >= 2" class="search-suggestions surface-panel">
            <div class="search-suggestion-header">
                <span>快速匹配</span>
                <button type="button" aria-label="清空搜索" (click)="clearSearch()">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
            <button *ngFor="let package of searchSuggestions" type="button" class="search-suggestion-result"
                (click)="openSearchSuggestion(package)">
                <mat-icon>extension</mat-icon>
                <span>{{package.packageName}}</span>
                <small>{{package.name}}</small>
            </button>
            <div *ngIf="searching" class="search-suggestion-empty">
                正在查找资源…
            </div>
            <div *ngIf="!searching && searchSuggestions.length === 0" class="search-suggestion-empty">
                没有匹配资源，按 Enter 查看完整搜索结果
            </div>
            <div class="search-suggestion-categories">
                <span>常用范围</span>
                <button *ngFor="let category of quickSearchCategories" type="button"
                    (click)="openCategory(category.value)">
                    {{category.text}}
                </button>
            </div>
            <button type="button" class="search-all-results" (click)="submitSearch()">
                <mat-icon>manage_search</mat-icon>
                <span>查看 “{{searchQuery.trim()}}” 的完整搜索结果</span>
            </button>
        </div>
    </div>

    <div *ngIf="this.user === undefined" class="auth-actions">
        <a mat-button class="signin-button" (click)="onSignInClick()">登录</a>
        <a mat-flat-button color="primary" class="signup-button" (click)="onSignUpClick()">注册</a>
    </div>
    <div *ngIf="this.user != undefined" class="control-panel">
        <!-- <button mat-button [matMenuTriggerFor]="manageAccounts"
                           [matMenuTriggerData]="menuItems">
            {{activeUser.Name}}
        </button> -->
        <button mat-icon-button class="toolbar-icon" [matMenuTriggerFor]="notificationMenu"
            [matMenuTriggerData]="menuItems" aria-label="通知">
            <mat-icon [matBadge]="(this.notifications === undefined ||
                this.notifications.length == 0) ? undefined :
                this.notifications.length" matBadgeColor="warn" matBadgeSize="small">notifications</mat-icon>
        </button>

        <mat-menu #notificationMenu class="notification-menu-panel" xPosition="before">
            <div class="notification-panel-shell">
            <div class="message-panel-header">
                <div>
                    <p>通知</p>
                    <span>{{notifications.length ? notifications.length + ' 条未读' : '全部已读'}}</span>
                </div>
                <button mat-button color="primary" type="button" class="message-panel-link" (click)="openInbox()">
                    <span>查看全部</span>
                </button>
            </div>
            <div class="message-panel-placeholder" *ngIf="notifications.length
                === 0">
                <div class="message-empty-icon">
                    <mat-icon>mark_email_read</mat-icon>
                </div>
                <strong>已全部读完</strong>
            </div>
            <div class="notification-list" *ngIf="notifications.length > 0">
                <ng-container *ngFor="let notification of notifications; let i=
                    index">
                    <button mat-menu-item (click)="openNotification(notification, i)" class="notification-button">
                        <app-notification-card [notification]="notification"></app-notification-card>
                    </button>
                </ng-container>
            </div>

            <div *ngIf="notifications.length> 0" class="message-panel-footer">
                <button mat-button type="button" class="clear-notifications" (click)="onClearAll()">
                    <mat-icon>done_all</mat-icon>
                    <span>全部标为已读</span>
                </button>
                <button mat-button color="primary" type="button" (click)="openInbox()">
                    收件箱
                </button>
            </div>
            </div>
        </mat-menu>

        <button mat-button class="account-trigger" [matMenuTriggerFor]="accountMenu">
            <app-user-card [user]="this.user" [clickable]="false" class="account-user-card">
            </app-user-card>
        </button>

        <mat-menu #accountMenu xPosition="before">
            <button mat-menu-item (click)="onUserDetail()">
                <mat-icon>account_circle</mat-icon>
                <span>账户详情</span>
            </button>
            <button mat-menu-item (click)="onSettings()">
                <mat-icon>settings</mat-icon>
                <span>设置</span>
            </button>
            <button mat-menu-item (click)="onSignOut()">
                <mat-icon>logout</mat-icon>
                <span>登出</span>
            </button>
        </mat-menu>
    </div>
</mat-toolbar>

<mat-progress-bar *ngIf="(progressService.currentMode | async) as mode" [mode]="mode"
    [value]="mode === 'determinate' ? (progressService.currentProgress | async) : 0">
</mat-progress-bar>
