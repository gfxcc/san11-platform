<div class="author-card">
    <div class="user-info-section">

        <div>
            <button mat-button (click)="onAvatarClick()" class="avatar-button">
                <!-- <div [hidden]="!this.displayUserImgLoading"
                    class="animated-background user-image"></div> -->
                <p-skeleton *ngIf="this.displayUserImgLoading" shape="circle" width="74px" height="74px"></p-skeleton>

                <img [hidden]="this.displayUserImgLoading" [src]="this.user?.imageUrl |
                    fullUrl : '128_128'" (load)="this.displayUserImgLoading=false;" class="avatar-image">
                <span *ngIf="updateAvatar && this.user.userId === currentUserId" class="avatar-edit-label">
                    <mat-icon>photo_camera</mat-icon>
                    更换头像
                </span>
            </button>
            <input type="file" accept="image/*" hidden="true" #imageInput (change)="onUploadUserAvatar(imageInput)">
        </div>

        <div class="text-info-wrapper">
            <div class="text-info">
                <a class="user-name clickable" [matTooltip]="this.user.username"
                    [href]="this.user.name">{{this.user.username}}</a>
                <div class="user-sub-count" [class.user-sub-count-pulse]="subscriberCountPulse">
                    <span>{{this.user.subscriberCount}}</span>
                    <span>位订阅者</span>
                </div>
            </div>
        </div>


    </div>
    <span class="author-spacer"></span>
    <div class="subscribe-section">
        <button *ngIf="!this.loadingSubscription && canSubscribeToUser" mat-flat-button class="subscribe-button"
            [class.unsubscribe-button]="subscription" color="primary"
            [class.subscribe-button-celebrate]="subscriptionBurst"
            [disabled]="subscriptionBusy"
            (click)="onSubscribe()">
            <mat-icon aria-hidden="true" class="subscribe-bell"
                [class.subscribe-bell-ring]="subscriptionBurst">{{this.subscription ? 'notifications_active' : 'notifications'}}</mat-icon>
            <span>{{this.subscription ? '已订阅' : '订阅'}}</span>
        </button>
        <span *ngIf="canSubscribeToUser" class="subscribe-burst" [class.subscribe-burst-active]="subscriptionBurst"
            aria-hidden="true">
            <i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i>
        </span>
        <p-skeleton *ngIf="this.loadingSubscription && canSubscribeToUser" width="64px" height="36px"></p-skeleton>
    </div>
</div>

<div *ngIf="avatarPreviewUrl" class="avatar-preview-panel">
    <img [src]="avatarPreviewUrl" alt="新头像预览">
    <div>
        <strong>确认新头像</strong>
        <span>上传前请检查头像显示效果。</span>
    </div>
    <button mat-stroked-button type="button" (click)="cancelAvatarUpload()">取消</button>
    <button mat-flat-button color="primary" type="button" (click)="confirmAvatarUpload()">保存头像</button>
</div>
