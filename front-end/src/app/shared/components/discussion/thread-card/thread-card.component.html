<article class="thread-row">
    <div class="status-cell" *ngIf="isAdmin() && thread.state!=1">
        <span class="status-badge">{{getStatusName()}}</span>
    </div>

    <a class="avatar-cell" href="users/{{user?.userId}}" target="_blink" aria-label="作者">
        <img [src]="getUserAvatar()" class="avatar-img" [hidden]="loadingAuthorImage" (load)="loadAvatar()"
            (error)="loadAvatar()">
        <p-skeleton *ngIf="this.loadingAuthorImage" [shape]="'circle'" height="40px" width="40px"></p-skeleton>
    </a>

    <div class="thread-main">
        <div class="thread-title-line">
            <a class="thread-title" [routerLink]="'/' + thread.name">{{thread.subject}}</a>
            <mat-icon *ngIf="thread.pinned" class="pin-icon" matTooltip="置顶">push_pin</mat-icon>
        </div>

        <div class="thread-meta">
            <a href="users/{{user?.userId}}" target="_blink">{{user?.username}}</a>
            <span>{{getThreadAge()}}</span>
        </div>

        <div class="thread-tags" *ngIf="this.thread.tags?.length">
            <span *ngFor="let tag of this.thread.tags">{{tag}}</span>
        </div>
    </div>

    <div class="thread-stats" aria-label="帖子统计">
        <span class="stat-pill" matTooltip="浏览">
            <mat-icon>drafts</mat-icon>
            {{thread.viewCount}}
        </span>
        <span class="stat-pill" matTooltip="回复">
            <mat-icon>forum</mat-icon>
            {{+thread.commentCount + +thread.replyCount}}
        </span>
    </div>

    <div class="latest-cell" *ngIf="notMobile">
        <span>{{getLatestCommentedAge()}}</span>
        <a href="users/{{latestCommenter?.userId}}" target="_blink">{{latestCommenter?.username}}</a>
    </div>
</article>
