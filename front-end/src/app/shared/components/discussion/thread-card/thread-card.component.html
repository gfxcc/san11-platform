<article class="thread-row">
    <a class="avatar-cell" href="users/{{user?.userId}}" target="_blink" aria-label="作者">
        <img [src]="getUserAvatar()" class="avatar-img" [hidden]="loadingAuthorImage" (load)="loadAvatar()"
            (error)="loadAvatar()">
        <p-skeleton *ngIf="this.loadingAuthorImage" [shape]="'circle'" height="40px" width="40px"></p-skeleton>
    </a>

    <div class="thread-main">
        <div class="thread-title-line">
            <a class="thread-title" [routerLink]="'/' + thread.name">{{thread.subject}}</a>
            <span *ngIf="thread.pinned" class="pin-badge" matTooltip="置顶">
                <mat-icon>push_pin</mat-icon>
                置顶
            </span>
            <span class="status-badge" *ngIf="isAdmin() && thread.state!=1">{{getStatusName()}}</span>
        </div>

        <div class="thread-meta">
            <a href="users/{{user?.userId}}" target="_blink" class="author-name">{{user?.username}}</a>
            <span class="meta-item">
                <mat-icon>schedule</mat-icon>
                {{getThreadAge()}}
            </span>
            <span class="thread-tags" *ngIf="this.thread.tags?.length">
                <span *ngFor="let tag of this.thread.tags">{{tag}}</span>
            </span>
        </div>
    </div>

    <div class="thread-side">
        <div class="thread-stats" aria-label="帖子统计">
            <span class="stat-pill" matTooltip="浏览">
                <mat-icon>visibility</mat-icon>
                {{thread.viewCount}}
            </span>
            <span class="stat-pill stat-replies" matTooltip="回复">
                <mat-icon>forum</mat-icon>
                {{+thread.commentCount + +thread.replyCount}}
            </span>
        </div>

        <div class="latest-cell">
            <span class="latest-label">最后回复</span>
            <span class="latest-time">{{getLatestCommentedAge()}}</span>
            <a href="users/{{latestCommenter?.userId}}" target="_blink">{{latestCommenter?.username || user?.username}}</a>
        </div>
    </div>
</article>
