<div class="main-container">
    <div class="table-wrapper app-list-panel">
        <div class="caption app-list-header" [class.caption-compact]="!showTitle" id=caption>
            <div class="caption-title" *ngIf="showTitle">
                <h3>
                    {{this.displayName}}
                </h3>
                <p>反馈问题、记录建议和跟进资源更新。</p>
            </div>
            <span class="example-spacer"></span>
            <button mat-flat-button color="primary" class="create-thread-button" matTooltip="新帖子"
                (click)="createThread()">
                <mat-icon>add</mat-icon>
                <span>新帖子</span>
            </button>
        </div>

        <div *ngIf="isLoading" class="thread-loading">
            <div class="thread-loading-row" *ngFor="let item of [1, 2, 3]">
                <p-skeleton shape="circle" width="42px" height="42px"></p-skeleton>
                <div class="thread-loading-copy">
                    <p-skeleton width="60%" height="16px"></p-skeleton>
                    <p-skeleton width="34%" height="12px"></p-skeleton>
                </div>
                <p-skeleton width="112px" height="28px"></p-skeleton>
            </div>
        </div>

        <div class="thread-list" *ngIf="!isLoading">
            <app-thread-card *ngFor="let thread of threads" [thread]="thread"></app-thread-card>
        </div>

        <div *ngIf="!isLoading && threads?.length === 0" class="dashboard-placeholder app-empty-state">
            <mat-icon>forum</mat-icon>
            <p>暂无讨论</p>
            <span>可以发起问题反馈、使用建议或版本更新讨论。</span>
        </div>

        <mat-paginator *ngIf="!isLoading && threads?.length > 0" [length]="totalThreadsCount" [pageSize]="pageSize" [hidePageSize]="true"
            (page)="changePage($event)">
        </mat-paginator>
    </div>
</div>
