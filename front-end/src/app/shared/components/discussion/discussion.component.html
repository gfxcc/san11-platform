<div class="main-container">
    <div class="table-wrapper">
        <div class="caption" id=caption>
            <h3>
                {{this.displayName}}
            </h3>
            <span class="example-spacer"></span>
            <button mat-mini-fab color="primary" matTooltip="新帖子" (click)="createThread()">
                <mat-icon>add</mat-icon>
            </button>
        </div>

        <app-thread-card *ngFor="let thread of threads" [thread]="thread"></app-thread-card>

        <div *ngIf="threads?.length === 0" class="dashboard-placeholder">
            <mat-icon>forum</mat-icon>
            <p>空空如也</p>
        </div>

        <mat-paginator [length]="totalThreadsCount" [pageSize]="pageSize" [hidePageSize]="true"
            (page)="changePage($event)">
        </mat-paginator>
    </div>
</div>
