<div class="page-wrapper thread-page-wrapper">
    <div class="page-content thread-page-content">
        <nav class="thread-breadcrumb" aria-label="讨论导航">
            <a routerLink="/">
                <mat-icon>home</mat-icon>
                主页
            </a>
            <mat-icon class="breadcrumb-separator">chevron_right</mat-icon>
            <ng-container *ngIf="isPackageThread; else generalDiscussionBreadcrumb">
                <a [routerLink]="parentCategoryRoute">{{parentCategoryName}}</a>
                <mat-icon class="breadcrumb-separator">chevron_right</mat-icon>
                <a [routerLink]="parentPackageRoute">{{parentPackageName}}</a>
                <mat-icon class="breadcrumb-separator">chevron_right</mat-icon>
                <a [routerLink]="parentPackageRoute" fragment="discussion">讨论区</a>
            </ng-container>
            <ng-template #generalDiscussionBreadcrumb>
                <a routerLink="/discussion">综合讨论区</a>
            </ng-template>
            <mat-icon class="breadcrumb-separator">chevron_right</mat-icon>
            <span aria-current="page">{{this.thread.subject}}</span>
        </nav>

        <article class="thread-panel surface-panel app-detail-section">
            <header class="thread-header app-detail-header">
                <div class="thread-title-block">
                    <div class="panel-title app-section-title">讨论</div>
                    <h1>{{this.thread.subject}}</h1>
                    <div class="thread-meta">
                        <a href="users/{{this.user?.userId}}" target="_blink">{{this.user?.username}}</a>
                        <span>{{getAge()}}</span>
                        <span *ngIf="thread.pinned" class="pin-pill">
                            <mat-icon>push_pin</mat-icon>
                            置顶
                        </span>
                    </div>
                </div>

                <div *ngIf="(isAdmin() || isAuthor())" class="thread-admin-actions app-action-row">
                    <button mat-stroked-button color="primary" *ngIf="this.descEditor_updated" (click)="onUpdate()">
                        <mat-icon>save</mat-icon>
                        更新
                    </button>

                    <button mat-stroked-button [matMenuTriggerFor]="threadAdminMenu">
                        <mat-icon>admin_panel_settings</mat-icon>
                        管理
                    </button>
                    <mat-menu #threadAdminMenu="matMenu" xPosition="before">
                        <button mat-menu-item *ngIf="isAdmin()" (click)="togglePin()">
                            <mat-icon>{{thread.pinned===true ? 'push_pin' : 'push_pin'}}</mat-icon>
                            <span>{{thread.pinned===true ? '取消置顶' : '置顶'}}</span>
                        </button>
                        <button mat-menu-item (click)="onFlipState()">
                            <mat-icon>{{thread.state===3 ? 'visibility' : 'visibility_off'}}</mat-icon>
                            <span>{{thread.state===3? '发布' : '隐藏'}}</span>
                        </button>
                        <button mat-menu-item class="danger-menu-item" (click)="onDelete()">
                            <mat-icon>delete</mat-icon>
                            <span>删除</span>
                        </button>
                    </mat-menu>
                </div>
            </header>

            <section class="thread-body">
                <aside class="author-card">
                    <img [hidden]="this.hideUserImage" [src]="getAuthorImage()" (load)="onAuthorImageLoad()"
                        (error)="onAuthorImageLoad()" class="author-image">
                    <div class="author-name">{{this.user?.username}}</div>
                    <div class="author-subtitle">发帖人</div>
                </aside>

                <div class="thread-content-card" [class.thread-content-card-editor-focused]="descEditor_onFocus">
                    <ckeditor class="editor" [data]="this.thread.content" [editor]="this.editorService.getEditorInstance()"
                        (ready)="this.editorService.onReady($event)" (focus)="descEditor_onFocus=true"
                        (blur)="descEditor_onFocus=false" (change)="onDescEditorChange($event)"
                        [disabled]="this.editorService.disabled" [config]="this.editorService.getConfig()">
                    </ckeditor>

                    <div class="thread-footer">
                        <div class="thread-tags">
                            <span class="thread-tags-label">标签</span>
                            <mat-form-field *ngIf="editable; else readonlyTags" class="tag-list" appearance="outline">
                                <mat-chip-grid #chipList>
                                    <mat-chip-row *ngFor="let tag of this.thread.tags" [selectable]="selectable"
                                        [removable]="editable" (removed)="remove(tag)">
                                        {{tag}}
                                        <mat-icon matChipRemove *ngIf="editable">cancel</mat-icon>
                                    </mat-chip-row>
                                    <input placeholder="输入标签后按回车" [matChipInputFor]="chipList"
                                        [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
                                        [matChipInputAddOnBlur]="addOnBlur" (matChipInputTokenEnd)="add($event)"
                                        aria-label="添加标签">
                                </mat-chip-grid>
                            </mat-form-field>
                            <ng-template #readonlyTags>
                                <div class="readonly-tag-list" *ngIf="this.thread.tags?.length; else noTags">
                                    <span class="readonly-tag" *ngFor="let tag of this.thread.tags">{{tag}}</span>
                                </div>
                            </ng-template>
                            <ng-template #noTags>
                                <span class="readonly-tag-empty">暂无标签</span>
                            </ng-template>
                        </div>

                        <app-feedback-card [target]="this.thread.name" [likeCount]="this.thread.likeCount"
                            [dislikeCount]="this.thread.dislikeCount"></app-feedback-card>
                    </div>
                </div>
            </section>
        </article>

        <section class="comments-panel surface-panel app-detail-section">
            <div class="comments-header app-section-header">
                <h2 class="app-section-title">评论</h2>
            </div>
            <app-comment-board [parent]="this.thread.name" [resourceOwnerId]="this.thread.authorId"
                commentsOrder="create_time"></app-comment-board>
        </section>
    </div>
</div>
