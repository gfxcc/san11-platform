<div class="create-page">
    <section class="create-panel surface-panel">
        <header class="create-header">
            <span class="create-icon">
                <mat-icon>{{this.isCreateArticle ? 'article' : 'add_box'}}</mat-icon>
            </span>
            <div>
                <h1>创建{{this.isCreateArticle ? '文章' : '资源'}}</h1>
                <p>{{this.isCreateArticle ? '发布新的专栏内容。' : '选择资源类别并创建新的作品页面。'}}</p>
            </div>
        </header>

        <form class="create-form" #createForm='ngForm' (ngSubmit)='onCreate(createForm)'>
            <mat-form-field appearance="outline">
                <mat-label>名称</mat-label>
                <input matInput required ngModel name="name">
            </mat-form-field>

            <mat-form-field *ngIf="isCreateArticle === false" appearance="outline">
                <mat-label>类别</mat-label>
                <mat-select [(ngModel)]="selectedCategory" required name="resourceType">
                    <mat-optgroup *ngFor="let group of resourceGroups" [label]="group.name" [disabled]="group.disabled">
                        <mat-option *ngFor="let resourceType of group.resourceTypes" [value]="resourceType">
                            {{resourceType.text}}
                        </mat-option>
                    </mat-optgroup>
                </mat-select>
            </mat-form-field>

            <div class="create-actions">
                <span class="example-spacer"></span>
                <button [disabled]="!createForm.valid" type="submit" mat-flat-button color="primary">
                    <mat-icon>add</mat-icon>
                    创建
                </button>
            </div>
        </form>
    </section>
</div>
