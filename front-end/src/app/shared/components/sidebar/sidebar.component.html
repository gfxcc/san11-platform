<div class="sidebar-shell">
    <button class="create-button" mat-flat-button color="primary" (click)="onClickCreateTool()">
        <mat-icon>add</mat-icon>
        <span>创建</span>
    </button>

    <div class="category-section">

        <mat-selection-list #categoryNav [multiple]="false" class="nav-list">
            <div class="section-label">个人</div>
            <mat-list-option *ngFor="let item of personalModules" [value]="item" (click)="onClickSidenav(item)">
                <div class="nav-link">
                    <mat-icon>{{item.icon}}</mat-icon>
                    <span>{{item.text}}</span>
                </div>
            </mat-list-option>

            <div class="section-label">工具分类</div>
            <mat-list-option *ngFor="let category of categories" [value]="category"
                [selected]="category.value===this.selectedCategory" (click)="onCategoryLabelClick(category)">
                <div class="nav-link">
                    <mat-icon>{{category.icon}}</mat-icon>
                    <span>{{category.text}}</span>
                </div>
            </mat-list-option>

            <div class="section-label">社区</div>
            <mat-list-option *ngFor="let webModule of webModules" [value]="webModule"
                [selected]="webModule.value===this.selectedCategory" (click)="onCategoryLabelClick(webModule)">
                <div class="nav-link">
                    <mat-icon>{{webModule.icon}}</mat-icon>
                    <span>{{webModule.text}}</span>
                </div>
            </mat-list-option>

            <div *ngIf="this.isAdmin()">
                <div class="section-label">管理</div>
                <mat-list-option *ngFor="let adminModule of adminModules" class="admin-nav-option" [value]="adminModule"
                    [selected]="isAdminModuleActive(adminModule)"
                    (click)="onClickSidenav(adminModule)">
                    <div class="nav-link">
                        <mat-icon>{{adminModule.icon}}</mat-icon>
                        <span>{{adminModule.text}}</span>
                        <span *ngIf="pendingReviewCount > 0" class="admin-pending-badge"
                            [attr.aria-label]="pendingReviewCount + ' 个待处理事项'"
                            [matTooltip]="pendingReviewCount + ' 个待处理事项'">
                            {{pendingReviewCount > 99 ? '99+' : pendingReviewCount}}
                        </span>
                    </div>
                </mat-list-option>
            </div>
        </mat-selection-list>


    </div>

    <div *ngIf="showDevEnvironmentBadge" class="sidebar-environment-badge" aria-label="开发环境">
        <mat-icon>code</mat-icon>
        <span>{{devEnvironmentLabel}}</span>
    </div>

    <footer class="footer-section">
        <a href="https://github.com/gfxcc/san11-platform" target="_blink">Github</a>
        <span>•</span>
        <a href="https://github.com/gfxcc/san11-platform/issues/new">Report Bugs</a>
    </footer>
</div>
