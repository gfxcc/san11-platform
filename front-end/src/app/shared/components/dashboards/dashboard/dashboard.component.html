<div class="catalog-page" [class.catalog-page-embedded]="!showCatalogHeader">
    <section class="catalog-command" *ngIf="showCatalogHeader || listRequest">
        <div class="catalog-title" *ngIf="showCatalogHeader">
            <div class="catalog-title-row">
                <span class="catalog-kicker">资源库</span>
                <span class="catalog-summary app-count-pill" *ngIf="packages != undefined">{{packages.length}} 项资源</span>
                <span class="catalog-summary app-count-pill" *ngIf="currentTagId">标签筛选</span>
            </div>
            <h1>{{catalogHeading}}</h1>
            <p>{{catalogDescription}}</p>
        </div>

        <div class="dashboard-actions" *ngIf="listRequest">
            <mat-form-field appearance="outline" class="sort-field">
                <mat-label>排序优先</mat-label>
                <mat-select [(value)]="selectedOrder" (selectionChange)="onOrderChanged($event)">
                    <mat-option [value]="option.value" *ngFor="let option of orderOptions">
                        {{ option.viewValue }}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>
    </section>

    <section class="search-refinement surface-panel" *ngIf="currentQuery">
        <div>
            <span class="app-eyebrow">搜索结果</span>
            <p>正在查找 <strong>{{currentQuery}}</strong>，可以继续切换资源范围。</p>
        </div>
        <div class="search-refinement-actions">
            <button type="button" *ngFor="let category of searchCategoryShortcuts" (click)="openCategory(category.value)">
                {{category.text}}
            </button>
        </div>
    </section>

    <div class="resource-grid">
        <app-package-card *ngFor="let package of packages" [package]="package" class="module"></app-package-card>
    </div>

    <div *ngIf="packages?.length === 0" class="dashboard-placeholder app-empty-state">
        <mat-icon>inventory_2</mat-icon>
        <p>{{emptyStateText}}</p>
        <button *ngIf="listRequest?.filter" mat-stroked-button color="primary" type="button" (click)="clearFilter()">
            清除筛选
        </button>
    </div>
</div>
