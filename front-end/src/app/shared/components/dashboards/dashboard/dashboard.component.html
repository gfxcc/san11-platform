<div class="catalog-page" [class.catalog-page-embedded]="!showCatalogHeader">
    <section class="catalog-command" *ngIf="showCatalogHeader || listRequest">
        <div class="catalog-title" *ngIf="showCatalogHeader">
            <div class="catalog-title-row">
                <span class="catalog-kicker">资源库</span>
                <span class="catalog-summary app-count-pill" *ngIf="packages != undefined">{{packages.length}} 项资源</span>
                <span class="catalog-summary app-count-pill" *ngIf="currentTagId">标签筛选</span>
            </div>
            <h1>{{catalogHeading}}</h1>
            <p>{{catalogDescription}}</p>
        </div>

        <div class="dashboard-actions" *ngIf="listRequest">
            <div class="dashboard-sort-control app-segmented-control" [ngClass]="orderClass" role="group"
                aria-label="资源排序">
                <span class="dashboard-sort-glass app-segmented-glass" aria-hidden="true"></span>
                <button type="button" class="dashboard-sort-option app-segmented-option" *ngFor="let option of orderOptions"
                    [class.dashboard-sort-option-active]="selectedOrder === option.value"
                    [class.app-segmented-option-active]="selectedOrder === option.value"
                    [attr.aria-pressed]="selectedOrder === option.value" (click)="selectOrder(option.value)">
                    {{ option.viewValue }}
                </button>
            </div>
        </div>
    </section>

    <section class="catalog-tags surface-panel" *ngIf="showTagToolbar">
        <div class="catalog-tags-list" *ngIf="tags.length">
            <button type="button" class="tag-filter" *ngFor="let tag of tags"
                [class.tag-filter-selected]="currentTagId === tag.name" (click)="onClickTag(tag)">
                <span>{{tag.tagName}}</span>
                <mat-icon *ngIf="currentTagId === tag.name">check</mat-icon>
                <mat-icon *ngIf="canManageTags()" class="tag-remove" (click)="removeTag(tag, $event)">close</mat-icon>
            </button>
        </div>

        <mat-form-field *ngIf="canManageTags()" appearance="outline" class="tag-create-field">
            <mat-label>新标签</mat-label>
            <input #tagInput matInput autocomplete="off" (keyup.enter)="createTag($event)">
            <button mat-icon-button matSuffix type="button" aria-label="创建标签"
                (click)="createTag({ target: tagInput })">
                <mat-icon>add</mat-icon>
            </button>
        </mat-form-field>
    </section>

    <section class="search-refinement surface-panel" *ngIf="currentQuery">
        <div>
            <span class="app-eyebrow">搜索结果</span>
            <p>正在查找 <strong>{{currentQuery}}</strong>，可以继续切换资源范围。</p>
        </div>
        <div class="search-refinement-actions">
            <button type="button" *ngFor="let category of searchCategoryShortcuts" (click)="openCategory(category.value)">
                {{category.text}}
            </button>
        </div>
    </section>

    <div class="resource-grid">
        <app-package-card *ngFor="let package of packages" [package]="package" class="module"></app-package-card>
    </div>

    <div *ngIf="packages?.length === 0" class="dashboard-placeholder app-empty-state">
        <mat-icon>inventory_2</mat-icon>
        <p>{{emptyStateText}}</p>
        <button *ngIf="listRequest?.filter" mat-stroked-button color="primary" type="button" (click)="clearFilter()">
            清除筛选
        </button>
    </div>
</div>
