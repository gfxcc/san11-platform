<div class="container">
    <section class="dashboard-toolbar">
        <div class="dashboard-summary" *ngIf="packages != undefined">
            <mat-icon>inventory_2</mat-icon>
            <span>{{packages.length}} 项资源</span>
        </div>

        <div class="dashboard-actions">
            <mat-form-field *ngIf="this.listRequest" appearance="outline" class="sort-field">
                <mat-label>排序优先</mat-label>
                <mat-select [(value)]="selectedOrder" (selectionChange)="onOrderChanged($event)">
                    <mat-option [value]="option.value" *ngFor="let option of orderOptions">
                        {{ option.viewValue }}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </div>
    </section>

    <div class="grid">
        <app-package-card *ngFor="let package of packages" [package]="package" class="module"></app-package-card>
    </div>
</div>

<div *ngIf="packages?.length === 0" class="dashboard-placeholder">
    <mat-icon>inventory_2</mat-icon>
    <p>空空如也</p>
</div>
