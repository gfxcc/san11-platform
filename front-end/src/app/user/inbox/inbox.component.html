<div class="inbox-page app-page app-page-narrow">
    <header class="inbox-header app-page-header">
        <div>
            <span class="app-eyebrow">通知中心</span>
            <h1>收件箱</h1>
            <p>查看资源反馈、回复、审核和系统通知。</p>
        </div>
        <button mat-stroked-button color="primary" type="button" [disabled]="unreadCount === 0" (click)="markAllRead()">
            <mat-icon>done_all</mat-icon>
            全部标为已读
        </button>
    </header>

    <section class="inbox-summary surface-panel" [class.inbox-summary-unread]="selectedFilter === 'unread'"
        [class.inbox-summary-read]="selectedFilter === 'read'" role="group" aria-label="通知筛选">
        <span class="inbox-filter-glass" aria-hidden="true"></span>
        <button type="button" class="inbox-filter" [class.inbox-filter-active]="selectedFilter === 'all'"
            [attr.aria-pressed]="selectedFilter === 'all'" (click)="setFilter('all')">
            <mat-icon>all_inbox</mat-icon>
            <span>全部</span>
            <strong>{{notifications.length}}</strong>
        </button>
        <button type="button" class="inbox-filter" [class.inbox-filter-active]="selectedFilter === 'unread'"
            [attr.aria-pressed]="selectedFilter === 'unread'" (click)="setFilter('unread')">
            <mat-icon>mark_email_unread</mat-icon>
            <span>未读</span>
            <strong>{{unreadCount}}</strong>
        </button>
        <button type="button" class="inbox-filter" [class.inbox-filter-active]="selectedFilter === 'read'"
            [attr.aria-pressed]="selectedFilter === 'read'" (click)="setFilter('read')">
            <mat-icon>mark_email_read</mat-icon>
            <span>已读</span>
            <strong>{{readCount}}</strong>
        </button>
    </section>

    <section class="inbox-feed app-activity-feed" *ngIf="!isLoadingNotifications && filteredNotifications?.length; else inboxFallback">
        <article *ngFor="let notification of filteredNotifications" class="inbox-item app-activity-item"
            (click)="onDetailClick(notification)"
            [class.inbox-item-unread]="notification.unread"
            [class.inbox-item-disabled]="!notification.link" [class.is-disabled]="!notification.link">
            <ng-container *ngIf="eventOf(notification) as event">
            <span class="inbox-marker app-activity-marker" [style.backgroundColor]="event.color">
                <mat-icon>{{event.icon}}</mat-icon>
            </span>

            <div class="inbox-card app-activity-card">
                <div class="inbox-card-copy app-activity-copy">
                    <div class="inbox-card-header app-activity-card-header">
                        <h2>{{event.displayName || (notification.unread ? '未读通知' : '通知')}}</h2>
                        <span>{{event.createTime}}</span>
                    </div>
                    <p *ngIf="event.description">{{event.description}}</p>
                </div>

                <img *ngIf="event.image" [src]="event.image" [alt]="event.displayName || '通知'" />
            </div>
            </ng-container>
        </article>
    </section>

    <ng-template #inboxFallback>
        <section class="inbox-feed inbox-skeleton-feed app-activity-feed" *ngIf="isLoadingNotifications; else emptyInbox"
            aria-hidden="true">
            <article class="inbox-skeleton-item" *ngFor="let row of inboxSkeletonRows">
                <span class="inbox-skeleton-marker inbox-skeleton-pulse"></span>
                <span class="inbox-skeleton-card">
                    <span class="inbox-skeleton-header">
                        <span class="inbox-skeleton-line inbox-skeleton-title inbox-skeleton-pulse"></span>
                        <span class="inbox-skeleton-line inbox-skeleton-time inbox-skeleton-pulse"></span>
                    </span>
                    <span class="inbox-skeleton-line inbox-skeleton-copy inbox-skeleton-pulse"></span>
                </span>
            </article>
        </section>
    </ng-template>

    <ng-template #emptyInbox>
        <div class="inbox-empty app-empty-state">
            <mat-icon>{{emptyStateIcon}}</mat-icon>
            <strong>{{emptyStateTitle}}</strong>
        </div>
    </ng-template>
</div>
