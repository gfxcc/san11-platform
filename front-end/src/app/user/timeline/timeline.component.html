<div class="timeline-page app-page app-page-narrow">
    <section class="timeline-feed app-activity-feed" *ngIf="events?.length; else emptyTimeline">
        <article *ngFor="let event of events" class="timeline-item app-activity-item" (click)="onDetailClick(event)"
            [class.timeline-item-disabled]="!event.link" [class.is-disabled]="!event.link">
            <span class="timeline-marker app-activity-marker" [style.backgroundColor]="event.color">
                <mat-icon>{{event.icon}}</mat-icon>
            </span>

            <div class="timeline-card app-activity-card">
                <div class="timeline-card-copy app-activity-copy">
                    <div class="timeline-card-header app-activity-card-header">
                        <h2>{{event.displayName}}</h2>
                        <span>{{event.createTime}}</span>
                    </div>
                    <p *ngIf="event.description">{{event.description}}</p>
                </div>

                <img *ngIf="event.image" [src]="event.image" [alt]="event.displayName" />
            </div>
        </article>
    </section>

    <ng-template #emptyTimeline>
        <div class="timeline-empty app-empty-state">
            <mat-icon>timeline</mat-icon>
            <p>暂无时间线记录</p>
        </div>
    </ng-template>
</div>
