<div class="auth-page">
    <section class="auth-panel surface-panel">
        <div class="auth-brand">
            <span class="brand-mark">
                <mat-icon>extension</mat-icon>
            </span>
            <div>
                <h1>{{selectedTabIndex === 0 ? '登陆' : '找回账号'}}</h1>
            </div>
        </div>

        <mat-tab-group #tagGroup [(selectedIndex)]="selectedTabIndex" class="header-less-tabs">
            <mat-tab label="login">
                <form class="auth-form" #signInForm='ngForm' (ngSubmit)="onSignIn(signInForm.value)">
                    <div class="field-stack">
                        <mat-form-field appearance="outline">
                            <mat-label>用户名/邮箱</mat-label>
                            <input matInput autocomplete="username" required ngModel name="identity">
                        </mat-form-field>

                        <mat-form-field appearance="outline">
                            <mat-label>密码</mat-label>
                            <input matInput type="password" autocomplete="current-password" required ngModel
                                name="password">
                        </mat-form-field>
                    </div>

                    <div class="auth-actions">
                        <button mat-button type="button" color="primary" (click)="onForgetPasswordClick()">忘记密码?</button>
                        <span class="example-spacer"></span>
                        <button mat-flat-button type="submit" color="primary">
                            <mat-icon>login</mat-icon>
                            登陆
                        </button>
                    </div>
                </form>
            </mat-tab>
            <mat-tab label="forget-password">
                <mat-vertical-stepper linear #stepper class="auth-stepper">
                    <mat-step [stepControl]="basicInfoForm" state="account_box">
                        <ng-template matStepLabel>1. 基本信息</ng-template>
                        <ng-template matStepContent>

                            <form class="auth-form" [formGroup]="basicInfoForm" (ngSubmit)="onBasicInfoNext(stepper)">
                                <mat-form-field appearance="outline">
                                    <mat-label>邮箱</mat-label>
                                    <input matInput type="email" autocomplete="email" formControlName="email">
                                    <mat-error *ngIf="email.errors?.email && email.touched" align="end">
                                        格式不正确
                                    </mat-error>
                                </mat-form-field>

                                <div class="step-actions">
                                    <button mat-flat-button color="primary" [disabled]="!basicInfoForm.valid"
                                        type="submit">
                                        下一步
                                    </button>
                                </div>
                            </form>

                        </ng-template>
                    </mat-step>
                    <mat-step [stepControl]="emailVerificationForm" state="email">
                        <ng-template matStepLabel>2. 验证邮箱</ng-template>
                        <ng-template matStepContent>
                            <form class="auth-form" [formGroup]="emailVerificationForm">
                                <p class="step-note">验证码已发送至 {{email.value}}</p>
                                <mat-form-field appearance="outline">
                                    <mat-label>验证码</mat-label>
                                    <input matInput autocomplete="off" formControlName="verificationCode">
                                </mat-form-field>
                            </form>
                            <div class="step-actions">
                                <button mat-button matStepperPrevious>上一步</button>
                                <button mat-flat-button color="primary" [disabled]="!this.emailVerificationForm.valid"
                                    (click)="onValidateEmail(stepper)">下一步</button>
                                <span class="example-spacer"></span>
                                <button mat-stroked-button [disabled]="this.timeToResend > 0" color="primary"
                                    (click)="onResendVerificationCodeClick()">重新发送 {{timeToResendText}}</button>
                            </div>
                        </ng-template>
                    </mat-step>
                    <mat-step state="password">
                        <ng-template matStepLabel>3. 修改密码</ng-template>
                        <ng-template matStepContent>
                            <form class="auth-form" [formGroup]="resetPasswordForm">
                                <mat-form-field appearance="outline">
                                    <mat-label>新密码</mat-label>
                                    <input matInput [type]="hidePassword ? 'password' : 'text'" autocomplete="off"
                                        formControlName="password">

                                    <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword"
                                        [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
                                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                                    </button>

                                </mat-form-field>
                            </form>
                            <div class="step-actions">
                                <button mat-button matStepperPrevious>上一步</button>
                                <button mat-flat-button color="primary" (click)="onUpdatePassword()">
                                    <mat-icon>lock_reset</mat-icon>
                                    修改密码
                                </button>
                            </div>
                        </ng-template>
                    </mat-step>

                    <!-- Icon overrides. -->
                    <ng-template matStepperIcon="account_box">
                        <mat-icon>account_box</mat-icon>
                    </ng-template>
                    <ng-template matStepperIcon="email">
                        <mat-icon>email</mat-icon>
                    </ng-template>
                    <ng-template matStepperIcon="password">
                        <mat-icon>password</mat-icon>
                    </ng-template>
                </mat-vertical-stepper>

                <button mat-button class="cancel-recovery" (click)="selectedTabIndex=0">取消</button>

            </mat-tab>
        </mat-tab-group>

    </section>
</div>
